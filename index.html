<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXORA Human Resource Suite</title>

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-container">

    <div class="login-box">

        <div class="logo">

            <h1>NEXORA</h1>

            <p>Human Resource Suite</p>

        </div>

        <h2>Welcome Back</h2>

        <input
        type="text"
        id="username"
        placeholder="Username">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button onclick="login()">
            Login
        </button>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
