<link rel="stylesheet" href="css/global.css">

<link rel="stylesheet"

<body>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">

<h1>NEXORA</h1>

<li>

<li>
<i class="fa-solid fa-file"></i>

<li>

</li>

<li>
<i class="fa-solid fa-chart-column"></i>
Reports
</li>

<li>
<i class="fa-solid fa-gear"></i>

</td>

</tr>

<tr>

<td>EMP002</td>
<td>John Doe</td>
<td>HR</td>
<td>Manager</td>
<td>

</span>

<button>Edit</button>

</td>

</tbody>

</table>
